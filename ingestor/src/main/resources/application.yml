sql:
   url: jdbc:mariadb://localhost:3306/lasrosasiot
   username: lasrosasiot
   password: lasrosasiot
influxdb:
   server: localhost
   username: lasrosasiot
   password: lasrosasiot
lora-servers:
  rak7249:
     mqtt:
       clientid: IngesterIn
       server: localhost
       persistenceFolder: target/mqtt
mqtt:
   clientid: IngesterOut
   persistenceFolder: target/mqtt
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  jpa:
    show-sql: Yes
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        current_session_context_class: org.springframework.orm.hibernate5.SpringSessionContext
        physical_naming_strategy: com.lasrosas.iot.database.UpperCaseNamingStrategy
logging:
  level:
    org.springframework.orm: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.engine.transaction.internal.TransactionImpl: DEBUG
    com.lasrosas.iot.reactore.reactores.WaterTankReactor: DEBUG
